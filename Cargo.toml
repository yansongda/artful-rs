[package]
name = "artisan"
version = "0.11.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[workspace]
members = ["artisan-*"]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/yansongda/artisan"

[features]
default = ["http"]
http = ["dep:artisan-http"]

[dependencies]
artisan-http = { path = "artisan-http", optional = true }

[dev-dependencies]
tokio = { version = "~1.52.0", features = ["rt-multi-thread", "macros"] }
async-trait = { version = "~0.1.89" }
reqwest = { version = "~0.13.2", features = ["json"] }
serde = { version = "~1.0.228", features = ["derive"] }
serde_json = { version = "~1.0.149" }
tracing = { version = "~0.1.44" }
thiserror = { version = "~2.0.18" }
tokio-test = { version = "~0.4.5" }
wiremock = { version = "~0.6.5" }
